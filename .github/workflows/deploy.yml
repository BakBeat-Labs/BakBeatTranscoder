name: Build, Sign, and Release

# Triggered either by pushing a version tag (git tag v1.2.3 && git push origin v1.2.3)
# or manually via the "Run workflow" button in the Actions tab (no tag needed —
# it creates one for you from the version you type in).
# Only run this after test.yml has validated the unsigned builds.
# Signing consumes quota — test first, sign once.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3, no leading v)"
        required: true

env:
  SIGN_CODE: "true"

jobs:
  prepare:
    name: Determine version and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.set.outputs.version }}
      tag: ${{ steps.set.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version and create tag if needed
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
            git tag "$TAG"
            git push origin "$TAG"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build + Sign ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-universal
            runner: macos-latest
            archive: bbt-macos-universal.tar.gz

          - platform: windows-x86_64
            runner: windows-latest
            archive: bbt-windows-x86_64.zip

          - platform: linux-x86_64
            runner: ubuntu-latest
            archive: bbt-linux-x86_64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set version
        run: echo "APP_VERSION=${{ needs.prepare.outputs.version }}" >> $GITHUB_ENV
        shell: bash

      # ── Rust ────────────────────────────────────────────────────────────────

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.platform == 'macos-universal'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Add Linux musl target
        if: matrix.platform == 'linux-x86_64'
        run: |
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get install -y musl-tools

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.platform }}-cargo-

      # ── Build bbt ──────────────────────────────────────────────────────────

      - name: Build bbt (macOS Universal)
        if: matrix.platform == 'macos-universal'
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/bbt \
            target/x86_64-apple-darwin/release/bbt \
            -output dist/bbt

      - name: Build bbt (Windows)
        if: matrix.platform == 'windows-x86_64'
        run: |
          cargo build --release --target x86_64-pc-windows-msvc
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\x86_64-pc-windows-msvc\release\bbt.exe dist\bbt.exe
        shell: powershell

      - name: Build bbt (Linux)
        if: matrix.platform == 'linux-x86_64'
        run: |
          cargo build --release --target x86_64-unknown-linux-musl
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/bbt dist/bbt

      # ── Bundle FFmpeg + ffprobe ────────────────────────────────────────────

      - name: Bundle FFmpeg (macOS)
        if: matrix.platform == 'macos-universal'
        run: |
          curl -fSL "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o ffmpeg.zip
          curl -fSL "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o ffprobe.zip
          unzip -j ffmpeg.zip ffmpeg -d dist/
          unzip -j ffprobe.zip ffprobe -d dist/
          chmod +x dist/ffmpeg dist/ffprobe

      - name: Bundle FFmpeg (Windows)
        if: matrix.platform == 'windows-x86_64'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # BtbN LGPL essentials — no GPL codecs.
          $releases = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases" `
            -Headers @{Authorization = "Bearer $env:GH_TOKEN"}
          Write-Host "=== Latest BtbN release: $($releases[0].tag_name) ==="
          $releases[0].assets | ForEach-Object { Write-Host "  $($_.name)" }
          $asset = $null
          foreach ($rel in $releases) {
            $asset = $rel.assets | Where-Object { $_.name -match "win64" -and $_.name -match "lgpl" } | Select-Object -First 1
            if ($asset) { break }
          }
          if (-not $asset) { Write-Error "No win64 lgpl asset found in recent BtbN releases"; exit 1 }
          Write-Host "Downloading $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile ffmpeg-win.zip
          Expand-Archive ffmpeg-win.zip -DestinationPath ffmpeg-tmp
          Copy-Item (Get-ChildItem ffmpeg-tmp -Recurse -Filter ffmpeg.exe  | Select-Object -First 1).FullName dist\ffmpeg.exe
          Copy-Item (Get-ChildItem ffmpeg-tmp -Recurse -Filter ffprobe.exe | Select-Object -First 1).FullName dist\ffprobe.exe
        shell: powershell

      - name: Bundle FFmpeg (Linux)
        if: matrix.platform == 'linux-x86_64'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # johnvansickle.com is unreliable from CI — use BtbN Linux LGPL builds.
          ASSET_URL=$(curl -fSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases" \
            | jq -r '.[0].assets[] | select(.name | test("linux64.*lgpl.*\\.tar\\.xz")) | .browser_download_url' \
            | head -1)
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "No linux64 lgpl tar.xz asset found in latest BtbN release"
            exit 1
          fi
          echo "Downloading: $ASSET_URL"
          curl -fSL "$ASSET_URL" -o ffmpeg-linux.tar.xz
          tar -xJf ffmpeg-linux.tar.xz
          cp ffmpeg-*/bin/ffmpeg dist/ffmpeg
          cp ffmpeg-*/bin/ffprobe dist/ffprobe
          chmod +x dist/ffmpeg dist/ffprobe

      # ── Build atracdenc ────────────────────────────────────────────────────
      # atracdenc requires libsndfile for PCM I/O.
      # macOS: arm64 only — bbt is Universal but atracdenc arm64 runs via Rosetta 2
      # on Intel Macs. Cross-compiling against Homebrew's arm64 libsndfile fails.

      - name: Build atracdenc (macOS)
        if: matrix.platform == 'macos-universal'
        run: |
          # Build Universal libsndfile and install to local prefix.
          # CMAKE_PREFIX_PATH lets cmake find it automatically.
          SNDFILE_PREFIX=$(pwd)/libsndfile-install

          git clone --depth 1 https://github.com/libsndfile/libsndfile.git libsndfile-src
          cmake -S libsndfile-src -B libsndfile-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_EXTERNAL_LIBS=OFF \
            -DCMAKE_INSTALL_PREFIX="$SNDFILE_PREFIX"
          cmake --build libsndfile-build
          cmake --install libsndfile-build

          git clone --depth 1 --recurse-submodules https://github.com/dcherednik/atracdenc.git atracdenc-src
          cmake -S atracdenc-src -B atracdenc-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$SNDFILE_PREFIX"
          cmake --build atracdenc-build --config Release
          BIN=$(find atracdenc-build -name "atracdenc" -not -name "*.cmake" -type f | head -1)
          cp "$BIN" dist/atracdenc
          chmod +x dist/atracdenc

      - name: Set up MSVC environment (Windows)
        if: matrix.platform == 'windows-x86_64'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build atracdenc (Windows)
        if: matrix.platform == 'windows-x86_64'
        run: |
          vcpkg install libsndfile:x64-windows-static
          git clone --depth 1 --recurse-submodules https://github.com/dcherednik/atracdenc.git atracdenc-src
          cmake -S atracdenc-src -B atracdenc-build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static
          cmake --build atracdenc-build --config Release
          $exe = Get-ChildItem atracdenc-build -Recurse -Filter "atracdenc.exe" | Select-Object -First 1
          Copy-Item $exe.FullName dist\atracdenc.exe
        shell: powershell

      - name: Build atracdenc (Linux)
        if: matrix.platform == 'linux-x86_64'
        run: |
          sudo apt-get install -y cmake build-essential libsndfile1-dev
          git clone --depth 1 --recurse-submodules https://github.com/dcherednik/atracdenc.git atracdenc-src
          cmake -S atracdenc-src -B atracdenc-build -DCMAKE_BUILD_TYPE=Release
          cmake --build atracdenc-build --config Release
          BIN=$(find atracdenc-build -name "atracdenc" -not -name "*.cmake" -type f | head -1)
          cp "$BIN" dist/atracdenc
          chmod +x dist/atracdenc

      # ── Code signing ───────────────────────────────────────────────────────
      #
      # Windows: SSL.com eSigner — same service as NetShift.
      #   Required secrets: ESIGNER_USERNAME, ESIGNER_PASSWORD,
      #                     ESIGNER_CREDENTIAL_ID, ESIGNER_TOTP_SECRET
      #
      # macOS: Apple Developer ID signing + notarization.
      #   SSL.com certificates cannot be used for Apple Gatekeeper notarization —
      #   Apple requires Developer ID certificates from the Apple Developer Program.
      #   Required secrets: MACOS_CERTIFICATE (base64 .p12), MACOS_CERTIFICATE_PWD,
      #                     KEYCHAIN_PASSWORD, APPLE_DEVELOPER_IDENTITY,
      #                     APPLE_ID, APPLE_APP_PASSWORD, APPLE_TEAM_ID
      #
      # Linux: No binary code signing equivalent. Instead, the release archive is
      #   detached-signed with GPG so users can verify provenance.
      #   Required secrets: GPG_PRIVATE_KEY (armored private key),
      #                     GPG_PASSPHRASE, GPG_KEY_ID

      # ── Windows: SSL.com eSigner ───────────────────────────────────────────

      - name: Sign bbt.exe (Windows — SSL.com eSigner)
        if: env.SIGN_CODE == 'true' && matrix.platform == 'windows-x86_64'
        uses: SSLcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ESIGNER_USERNAME }}
          password: ${{ secrets.ESIGNER_PASSWORD }}
          credential_id: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ESIGNER_TOTP_SECRET }}
          file_path: dist\bbt.exe
          malware_block: false

      - name: Sign atracdenc.exe (Windows — SSL.com eSigner)
        if: env.SIGN_CODE == 'true' && matrix.platform == 'windows-x86_64'
        uses: SSLcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ESIGNER_USERNAME }}
          password: ${{ secrets.ESIGNER_PASSWORD }}
          credential_id: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ESIGNER_TOTP_SECRET }}
          file_path: dist\atracdenc.exe
          malware_block: false

      # ── macOS: Apple Developer ID ──────────────────────────────────────────

      - name: Import Apple signing certificate
        if: env.SIGN_CODE == 'true' && matrix.platform == 'macos-universal'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo "$MACOS_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Sign macOS binaries (Apple Developer ID)
        if: env.SIGN_CODE == 'true' && matrix.platform == 'macos-universal'
        run: |
          for binary in dist/bbt dist/ffmpeg dist/ffprobe dist/atracdenc; do
            codesign --force --options runtime \
              --sign "${{ secrets.APPLE_DEVELOPER_IDENTITY }}" \
              "$binary"
            codesign --verify --verbose "$binary"
          done

      - name: Notarize macOS binaries
        if: env.SIGN_CODE == 'true' && matrix.platform == 'macos-universal'
        run: |
          # Zip the dist directory for submission
          ditto -c -k --keepParent dist bbt-notarize.zip
          xcrun notarytool submit bbt-notarize.zip \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          # Note: xcrun stapler only works for .app/.pkg/.dmg.
          # For standalone binaries, Gatekeeper verifies notarization online.

      # ── Bundle license files ───────────────────────────────────────────────

      - name: Bundle license files (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          cp LICENSE dist/LICENSE
          cp THIRD-PARTY-LICENSES dist/THIRD-PARTY-LICENSES

      - name: Bundle license files (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item LICENSE dist\LICENSE
          Copy-Item THIRD-PARTY-LICENSES dist\THIRD-PARTY-LICENSES
        shell: powershell

      # ── Package ────────────────────────────────────────────────────────────

      - name: Package (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          ls -lh dist/
          cd dist
          tar -czf ../${{ matrix.archive }} .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Get-ChildItem dist\
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.archive }}
        shell: powershell

      # ── Linux: GPG-sign the release archive ─────────────────────────────────

      - name: Import GPG signing key
        if: env.SIGN_CODE == 'true' && matrix.platform == 'linux-x86_64'
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: GPG-sign release archive (Linux)
        if: env.SIGN_CODE == 'true' && matrix.platform == 'linux-x86_64'
        run: |
          gpg --batch --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --local-user "${{ secrets.GPG_KEY_ID }}" \
            --detach-sign --armor ${{ matrix.archive }}

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.archive }}
          retention-days: 7

      - name: Upload GPG signature (Linux)
        if: env.SIGN_CODE == 'true' && matrix.platform == 'linux-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-signature
          path: ${{ matrix.archive }}.asc
          retention-days: 7

  # ── GitHub Release ───────────────────────────────────────────────────────────

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    permissions:
      contents: write

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded artifacts
        run: find . -name "*.tar.gz" -o -name "*.zip" -o -name "*.asc" | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: BakBeat Transcoder ${{ needs.prepare.outputs.tag }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            macos-universal/bbt-macos-universal.tar.gz
            windows-x86_64/bbt-windows-x86_64.zip
            linux-x86_64/bbt-linux-x86_64.tar.gz
            linux-x86_64-signature/bbt-linux-x86_64.tar.gz.asc
          body: |
            ## BakBeat Transcoder ${{ needs.prepare.outputs.tag }}

            ### Downloads

            | Platform | Archive |
            |---|---|
            | macOS (Universal — Apple Silicon + Intel) | `bbt-macos-universal.tar.gz` |
            | Windows x86_64 | `bbt-windows-x86_64.zip` |
            | Linux x86_64 | `bbt-linux-x86_64.tar.gz` |

            Each archive contains: `bbt`, `ffmpeg`, `ffprobe`, `atracdenc`

            Extract and place all binaries in the same directory. See the [README](https://github.com/${{ github.repository }}#readme) for usage.

            ### Verifying the Linux release

            The Linux archive is signed with our GPG key. `bbt-linux-x86_64.tar.gz.asc` is a detached signature:

            ```
            gpg --verify bbt-linux-x86_64.tar.gz.asc bbt-linux-x86_64.tar.gz
            ```

            See the [README](https://github.com/${{ github.repository }}#readme) for the public key.

            ### Bundled tools
            - FFmpeg (LGPL — audio/video encoding)
            - atracdenc (LGPL — MiniDisc ATRAC encoding)

            These are bundled for convenience. See [license notes](https://github.com/${{ github.repository }}#license) for details.
